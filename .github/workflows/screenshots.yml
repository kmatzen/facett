name: Screenshot Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  screenshots:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Facett.xcodeproj -scheme Facett

      - name: Run screenshot tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Facett.xcodeproj \
            -scheme Facett \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro Max" \
            -only-testing:FacettUITests/SnapshotTests \
            -resultBundlePath TestResults \
            2>&1 | xcbeautify

      - name: Collect fastlane screenshots
        if: always()
        run: |
          mkdir -p screenshots
          cp ~/Library/Caches/tools.fastlane/screenshots/*.png screenshots/ 2>/dev/null || true
          echo "Collected $(ls screenshots/*.png 2>/dev/null | wc -l | tr -d ' ') fastlane screenshots"

      - name: Collect failure diffs
        if: failure()
        run: |
          mkdir -p snapshot-failures
          find FacettUITests/__Snapshots__ -name "*.png" -newer FacettUITests/SnapshotTests.swift -exec cp {} snapshot-failures/ \; 2>/dev/null || true
          echo "Collected $(ls snapshot-failures/*.png 2>/dev/null | wc -l | tr -d ' ') failure diffs"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Upload failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: snapshot-failures/
          if-no-files-found: ignore
